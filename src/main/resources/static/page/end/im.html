    <style>
        .chat-container { width: 90%; max-width: 900px; height: 600px; margin: 10px auto; border: 1px solid #ddd; background-color: #fff; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        .chat-header { text-align: center; font-size: 20px; font-weight: bold; line-height: 50px; border-bottom: 1px solid #eee; background: #f9f9f9; border-radius: 8px 8px 0 0; }
        .chat-header span { font-size: 14px; color: #999; font-weight: normal; margin-left: 8px; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 15px; background: #fafafa; }
        .msg-item { display: flex; margin-bottom: 16px; align-items: flex-start; }
        .msg-item.self { flex-direction: row-reverse; }
        .msg-avatar { width: 44px; height: 44px; border-radius: 50%; flex-shrink: 0; }
        .msg-body { max-width: 65%; margin: 0 10px; }
        .msg-username { font-size: 14px; color: #666; margin-bottom: 4px; }
        .msg-item.self .msg-username { text-align: right; }
        .msg-bubble { padding: 10px 14px; border-radius: 12px; font-size: 15px; line-height: 1.6; word-break: break-word; background: #e8f4fd; color: #333; }
        .msg-item.self .msg-bubble { background: #95ec69; }
        .msg-time { font-size: 12px; color: #aaa; margin-top: 4px; }
        .msg-item.self .msg-time { text-align: right; }
        .chat-input { border-top: 1px solid #eee; padding: 12px 15px; display: flex; align-items: center; gap: 10px; }
        .chat-input textarea { flex: 1; height: 60px; resize: none; border: 1px solid #ddd; border-radius: 6px; padding: 8px 12px; font-size: 15px; outline: none; }
        .chat-input textarea:focus { border-color: #409EFF; }
        .chat-input .el-button { height: 60px; }
        .online-count { font-size: 13px; color: #67C23A; }
        .system-msg { text-align: center; color: #999; font-size: 13px; margin: 10px 0; }
    </style>
</head>

                </a>
                <el-submenu index="1" v-if="user.permission && user.permission.length > 0">
                    <template slot="title">
                        <i class="el-icon-menu"></i>
                        <span slot="title">功能区域</span>
                    </template>
                    <a :href=`${item.path}` v-for="item in user.permission" :key="item.id">
                        <el-menu-item :index="item.flag">
                            <i class="el-icon-s-data"></i>
                            <span slot="title">{{item.name}}</span>
                        </el-menu-item>
                    </a>
                </el-submenu>
            </el-menu>
        </el-aside>
        <el-container>
            <el-header class="admin-header">
                <el-row>
                    <el-col :span="1">
                        <i style="font-size: 22px; cursor: pointer"
                           :class="[isCollapse ? 'el-icon-s-unfold' : 'el-icon-s-fold']" @click="handleCollapse"></i>
                    </el-col>
                    <el-col :span="6" :offset="17" style="text-align: right">
                        <el-dropdown trigger="click">
                            <span style="display:inline-flex;align-items:center;gap:12px;cursor:pointer;height:60px;">
                                <span style="font-size:20px;font-weight:700;color:#111827;">{{user.username}}</span>
                                <img :src=`/api/files/${user.avatar}` style="width:50px;height:50px;border-radius:50%;object-fit:cover;border:2px solid #E5E7EB;">
                            </span>
                            <el-dropdown-menu slot="dropdown">
                                <el-dropdown-item>
                                    <a href="/page/end/person.html" style="display:block;padding:4px 12px;font-size:17px;color:#1C1917;text-decoration:none;">个人信息</a>
                                </el-dropdown-item>
                                <el-dropdown-item>
                                    <a @click="logout" href="#" style="display:block;padding:4px 12px;font-size:17px;color:#DC2626;text-decoration:none;">退出</a>
                                </el-dropdown-item>
                            </el-dropdown-menu>
                        </el-dropdown>
                    </el-col>
                </el-row>
            </el-header>
            <!-- 主体区域 -->
            <el-main class="admin-body">
                <div style="display:flex;gap:15px;height:calc(100vh - 120px);">
                    <!-- 左侧：聊天室 -->
                    <div class="chat-container" style="flex:2;">
                        <div class="chat-header">
                            救助咨询聊天室
                            <span class="online-count">（在线 {{onlineCount}} 人）</span>
                        </div>
                        <div class="chat-messages" id="chat-box">
                            <div class="system-msg">欢迎来到救助咨询聊天室，您可以在这里发送救助咨询信息，所有在线用户都可以看到。</div>
                        </div>
                        <div class="chat-input">
                            <textarea v-model="text" placeholder="请输入救助咨询内容..." @keydown.enter.prevent="send"></textarea>
                            <el-button type="primary" @click="send" :disabled="!text.trim()">发送</el-button>
                        </div>
                    </div>
                    <!-- 右侧：症状申请 -->
                    <div style="flex:1;display:flex;flex-direction:column;gap:15px;">
                        <!-- 申请按钮区域 -->
                        <div style="background:#fff;border-radius:8px;padding:15px;box-shadow:0 2px 12px rgba(0,0,0,0.1);">
                            <div style="font-size:16px;font-weight:bold;margin-bottom:12px;">动物症状申请</div>
                            <el-button type="warning" @click="symptomVisible=true" style="width:100%;">填写症状申请</el-button>
                        </div>
                        <!-- 我的申请记录 -->
                        <div style="flex:1;background:#fff;border-radius:8px;padding:15px;overflow-y:auto;box-shadow:0 2px 12px rgba(0,0,0,0.1);">
                            <div style="font-size:16px;font-weight:bold;margin-bottom:12px;">我的申请记录</div>
                            <div v-if="myApplications.length===0" style="color:#999;text-align:center;padding:40px 0;">暂无申请记录</div>
                            <div v-for="item in myApplications" :key="item.id" style="border-bottom:1px solid #eee;padding:10px 0;">
                                <div style="font-weight:600;">{{item.title}}</div>
                                <div style="font-size:13px;color:#666;margin:4px 0;">{{item.description}}</div>
                                <div style="display:flex;justify-content:space-between;align-items:center;">
                                    <el-tag :type="item.status===2?'success':item.status===0?'warning':'info'" size="mini">{{formatStatus(item.status)}}</el-tag>
                                    <span style="font-size:11px;color:#aaa;">{{item.createTime}}</span>
                                </div>
                                <div v-if="item.remark" style="margin-top:6px;padding:6px;background:#f0f9ff;border-radius:4px;font-size:13px;">
                                    <span style="color:#409EFF;font-weight:600;">管理员回复：</span>{{item.remark}}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 动物症状申请弹窗 -->
                <el-dialog title="动物症状申请" :visible.sync="symptomVisible" width="50%">
                    <el-form :model="symptomForm" label-width="80px">
                        <el-form-item label="动物名称">
                            <el-input v-model="symptomForm.animalName" placeholder="请输入动物名称或品种"></el-input>
                        </el-form-item>
                        <el-form-item label="发现地点">
                            <el-input v-model="symptomForm.location" placeholder="请输入发现地点"></el-input>
                        </el-form-item>
                        <el-form-item label="联系电话">
                            <el-input v-model="symptomForm.phone" placeholder="请输入联系电话"></el-input>
                        </el-form-item>
                        <el-form-item label="症状描述">
                            <el-input type="textarea" v-model="symptomForm.symptom" :rows="4" placeholder="请详细描述动物的症状表现"></el-input>
                        </el-form-item>
                    </el-form>
                    <div slot="footer">
                        <el-button @click="symptomVisible=false">取消</el-button>
                        <el-button type="primary" @click="submitSymptom">提交申请</el-button>
                    </div>
                </el-dialog>
            </el-main>
        </el-container>
    </el-container>
</div>

<script src="../../js/jquery.min.js"></script>
<script src="../../js/vue.min.js"></script>
<script src="../../js/element.js"></script>

<script>
    var socket;
    var vm;

    function openSocket() {
        var username = JSON.parse(sessionStorage.getItem("user")).username;
        if (typeof(WebSocket) == "undefined") {
            console.log("您的浏览器不支持WebSocket");
            return;
        }
        var protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
        var socketUrl = protocol + "//" + location.host + "/api/imserver/" + username;
        if (socket != null) {
            socket.close();
            socket = null;
        }
        socket = new WebSocket(socketUrl);
        socket.onopen = function () {
            console.log("WebSocket已连接");
        };
        socket.onmessage = function (msg) {
            var data = JSON.parse(msg.data);
            if (data.users) {
                vm.onlineCount = data.users.length;
            } else if (data.type === 'chat') {
                var isSelf = (data.from === vm.user.username);
                appendMessage(data.from, data.text, isSelf, data.time);
            } else if (data.type === 'join') {
                vm.onlineCount++;
                appendSystemMsg(data.username + ' 加入了聊天室');
            } else if (data.type === 'leave') {
                vm.onlineCount = Math.max(0, vm.onlineCount - 1);
                appendSystemMsg(data.username + ' 离开了聊天室');
            }
        };
        socket.onclose = function () {
            console.log("WebSocket已关闭");
        };
        socket.onerror = function () {
            console.log("WebSocket发生错误");
        };
    }

    var defaultAvatar = 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="44" height="44"><circle cx="22" cy="22" r="22" fill="#ddd"/><text x="22" y="28" text-anchor="middle" fill="#999" font-size="14">@</text></svg>');

    function formatChatTime(value) {
        if (!value) {
            value = new Date();
        }
        var normalized = typeof value === 'string' ? value.replace(' ', 'T') : value;
        var date = new Date(normalized);
        if (isNaN(date.getTime())) {
            return value;
        }
        var now = new Date();
        var isToday = date.getFullYear() === now.getFullYear()
            && date.getMonth() === now.getMonth()
            && date.getDate() === now.getDate();
        var hhmm = date.toLocaleTimeString('zh-CN', {hour: '2-digit', minute: '2-digit'});
        if (isToday) {
            return hhmm;
        }
        var yyyy = date.getFullYear();
        var mm = String(date.getMonth() + 1).padStart(2, '0');
        var dd = String(date.getDate()).padStart(2, '0');
        return yyyy + '-' + mm + '-' + dd + ' ' + hhmm;
    }

    function appendMessage(username, text, isSelf, timeValue) {
        var avatarUrl = isSelf ? ('/api/files/' + vm.user.avatar) : defaultAvatar;
        var time = formatChatTime(timeValue);
        var cls = isSelf ? 'msg-item self' : 'msg-item';
        var html = '<div class="' + cls + '">'
            + '<img class="msg-avatar" src="' + avatarUrl + '" onerror="this.src=defaultAvatar">'
            + '<div class="msg-body">'
            + '<div class="msg-username">' + username + '</div>'
            + '<div class="msg-bubble">' + escapeHtml(text) + '</div>'
            + '<div class="msg-time">' + time + '</div>'
            + '</div></div>';
        var box = document.getElementById('chat-box');
        box.insertAdjacentHTML('beforeend', html);
        box.scrollTop = box.scrollHeight;
    }

    function appendSystemMsg(text) {
        var html = '<div class="system-msg">' + text + '</div>';
        var box = document.getElementById('chat-box');
        box.insertAdjacentHTML('beforeend', html);
        box.scrollTop = box.scrollHeight;
    }

    function escapeHtml(str) {
        var div = document.createElement('div');
        div.appendChild(document.createTextNode(str));
        return div.innerHTML;
    }

    vm = new Vue({
        el: "#wrapper",
        data: {
            user: {},
            isCollapse: false,
            text: "",
            onlineCount: 0,
            symptomVisible: false,
            symptomForm: { animalName: '', location: '', phone: '', symptom: '' },
            myApplications: []
        },
        created: function() {
            this.user = sessionStorage.getItem("user") ? JSON.parse(sessionStorage.getItem("user")) : {};
            if (!this.user.id) {
                location.href = "/page/end/login.html";
                return;
            }
            this.symptomForm.phone = this.user.phone || '';
            openSocket();
            this.loadChatHistory();
            this.loadMyApplications();
        },
        methods: {
            formatStatus: function(s) {
                var m = {0: '待处理', 1: '处理中', 2: '已完成', 3: '已关闭'};
                return m[s] || '未知';
            },
            loadChatHistory: function() {
                var self = this;
                $.get("/api/help/chat/history").then(function(res) {
                    if (res.code === '0' && res.data) {
                        var records = res.data;
                        for (var i = 0; i < records.length; i++) {
                            var item = records[i];
                            var isSelf = (item.uname === self.user.username);
                            appendMessage(item.uname, item.description, isSelf, item.createTime);
                        }
                    }
                });
            },
            loadMyApplications: function() {
                var self = this;
                $.get("/api/help/mine?uid=" + self.user.id).then(function(res) {
                    if (res.code === '0') {
                        self.myApplications = res.data || [];
                    }
                });
            },
            loadHistory: function() {
                var self = this;
                $.get("/api/help?pageNum=1&pageSize=50").then(function(res) {
                    if (res.code === '0' && res.data && res.data.records) {
                        var records = res.data.records;
                        for (var i = records.length - 1; i >= 0; i--) {
                            var item = records[i];
                            var time = item.createTime || '';
                            var html = '<div class="msg-item">'
                                + '<img class="msg-avatar" src="' + defaultAvatar + '">'
                                + '<div class="msg-body">'
                                + '<div class="msg-username">' + (item.uname || '用户') + '</div>'
                                + '<div class="msg-bubble">' + escapeHtml(item.description || item.title || '') + '</div>'
                                + '<div class="msg-time">' + time + '</div>'
                                + '</div></div>';
                            document.getElementById('chat-box').insertAdjacentHTML('beforeend', html);
                        }
                    }
                });
            },
            handleCollapse: function() {
                this.isCollapse = !this.isCollapse;
            },
            logout: function() {
                $.get("/api/user/logout");
                sessionStorage.removeItem("user");
                location.href = "/page/end/login.html";
            },
            send: function() {
                if (!this.text.trim()) {
                    this.$message({ type: 'warning', message: '请输入内容' });
                    return;
                }
                var self = this;
                var msg = this.text;
                $.ajax({
                    url: "/api/help/chat",
                    type: "POST",
                    contentType: "application/json",
                    data: JSON.stringify({
                        uid: self.user.id,
                        uname: self.user.username,
                        description: msg
                    })
                }).then(function(res) {
                    var saved = res.data || {};
                    socket.send(JSON.stringify({ text: msg, time: saved.createTime }));
                    self.text = '';
                });
            },
            submitSymptom: function() {
                if (!this.symptomForm.animalName) {
                    this.$message({ type: 'warning', message: '请输入动物名称' });
                    return;
                }
                if (!this.symptomForm.symptom) {
                    this.$message({ type: 'warning', message: '请描述动物症状' });
                    return;
                }
                var self = this;
                $.ajax({
                    url: "/api/help",
                    type: "POST",
                    contentType: "application/json",
                    data: JSON.stringify({
                        uid: self.user.id,
                        uname: self.user.username,
                        title: '动物症状申请 - ' + self.symptomForm.animalName,
                        description: self.symptomForm.symptom,
                        location: self.symptomForm.location || '未填写',
                        phone: self.symptomForm.phone || '',
                        status: 0
                    })
                }).then(function(res) {
                    if (res.code === '0') {
                        self.$message({ type: 'success', message: '症状申请提交成功' });
                        self.symptomVisible = false;
                        self.symptomForm = { animalName: '', location: '', phone: self.user.phone || '', symptom: '' };
                        self.loadMyApplications();
                    } else {
                        self.$message({ type: 'error', message: res.msg || '提交失败' });
                    }
                });
            }
        }
    });
</script>
<script src="../../js/dark-mode.js"></script>
</body>
</html>
