<script src="../../js/jquery.min.js"></script>
<script src="../../js/vue.min.js"></script>
<script src="../../js/element.js"></script>
<script>
    $(document).ajaxError(function(event, xhr) {
        if (xhr.status === 401) { location.href = '/page/end/login.html'; }
    });
    let pieOption = { title:{text:"支出统计"}, legend:{x:"left",y:"center",orient:"vertical",data:[]}, tooltip:{show:true}, xAxis:null, yAxis:null, series:[{type:"pie",radius:"55%",data:[]}] };
    let pieOption1 = { title:{text:"收入统计"}, legend:{x:"left",y:"center",orient:"vertical",data:[]}, tooltip:{show:true}, xAxis:null, yAxis:null, series:[{type:"pie",radius:"55%",data:[]}] };
    new Vue({
        el: "#wrapper",
        data: { active:0, users:[], animals:[], adopts:[], notices:[], volunteers:[], accounts:[], user:{}, tableData:[], pageNum:1, pageSize:10, total:0, total1:0, total2:0, total3:0, dialogFormVisible:false, entity:{}, isCollapse:false },
        created() {
            this.user = sessionStorage.getItem("user") ? JSON.parse(sessionStorage.getItem("user")) : {};
            if (!this.user.id) { location.href = "/page/end/login.html"; return; }
            this.$nextTick(() => { this.load(); this.loadEcharts(); });
        },
        methods: {
            loadEcharts() {
                let pieChart = echarts.init(document.getElementById('main'));
                $.get("/api/account").then(res => {
                    this.accounts = res.data.filter(v => v.avalue<0);
                    pieOption.legend.data = this.accounts.map(v => v.alabel);
                    let arr = this.accounts.map(item => ({name:item.alabel, value:item.avalue}));
                    pieOption.series[0].data = this.GroupBy(arr,['name'],(d,v)=>{ d=d||0; return d+=v.value; });
                    pieChart.setOption(pieOption);
                });
                let pieChart1 = echarts.init(document.getElementById('bar'));
                $.get("/api/account").then(res => {
                    this.accounts = res.data.filter(v => v.avalue>0);
                    pieOption1.legend.data = this.accounts.map(v => v.alabel);
                    let arr = this.accounts.map(item => ({name:item.alabel, value:item.avalue}));
                    pieOption1.series[0].data = this.GroupBy(arr,['name'],(d,v)=>{ d=d||0; return d+=v.value; });
                    pieChart1.setOption(pieOption1);
                });
            },
            GroupBy(datas,keys,callBack) {
                const list = datas || []; const groups = [];
                list.forEach(v => { const key = {}; keys.forEach(k => { key[k] = v[k]; }); let group = groups.find(v => v._key === JSON.stringify(key)); if (!group) { group = { _key:JSON.stringify(key), name:key.name, key:key }; groups.push(group); } if(callBack) { group.value = callBack(group.value,v); group.total = group.total||0; group.total++; } else { group.value = group.value||[]; group.value.push(v); } });
                return groups;
            },
            load() {
                $.get("/api/notice/").then(res => { this.notices = res.data; });
                $.get("/api/volunteer/").then(res => { this.volunteers = res.data; this.total3 = this.volunteers.length; });
                $.get("/api/user/").then(res => { this.users = res.data; this.total = this.users.length; });
                $.get("/api/animal/").then(res => { this.animals = res.data; this.total1 = this.animals.length; });
                $.get("/api/adopt/").then(res => { this.adopts = res.data; this.total2 = this.adopts.length; });
            },
            handleCollapse() { this.isCollapse = !this.isCollapse; },
            logout() { $.get("/api/user/logout"); sessionStorage.removeItem("user"); location.href = "/page/end/login.html"; },
            hasAdminAccess() {
                const roles = this.user && this.user.role ? this.user.role : [];
                return roles.some(item => { const roleName = (item&&item.name?item.name:'').toLowerCase(); const desc = (item&&item.description?item.description:'').toLowerCase(); return roleName.includes('admin')||roleName.includes('管理员')||desc.includes('admin')||desc.includes('管理员'); }) || this.user.username === 'admin' || this.user.username === 'superadmin';
            }
        }
    });
</script>
<script src="../../js/dark-mode.js"></script>
</body>
