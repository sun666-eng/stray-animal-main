<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>动物详情</title>
    <link rel="stylesheet" href="../../css/base.css">
    <link rel="stylesheet" href="../../css/element.css">
    <style>
        body { background: #f5f7fb; }
        .page-shell { max-width: 1000px; margin: 0 auto; padding: 30px 20px 60px; }
        .panel { background: #fff; border-radius: 18px; overflow: hidden; box-shadow: 0 8px 24px rgba(25, 43, 77, 0.08); }
        .top { display: grid; grid-template-columns: 1.2fr 1fr; gap: 0; }
        .top img { width: 100%; height: 420px; object-fit: cover; background: #eef3ff; }
        .content { padding: 28px; }
        .title { font-size: 30px; color: #23334a; font-weight: 700; margin-bottom: 10px; }
        .status { display: inline-block; margin-bottom: 18px; padding: 5px 12px; border-radius: 999px; background: #e8f2ff; color: #356df3; font-size: 12px; }
        .meta { color: #5f6b7f; line-height: 2; font-size: 15px; }
        .desc { margin-top: 18px; background: #f7f9fd; border-radius: 14px; padding: 16px; color: #344055; line-height: 1.9; }
        .actions { display: flex; gap: 12px; margin-top: 22px; flex-wrap: wrap; }
        .btn { height: 42px; padding: 0 18px; border: 0; border-radius: 10px; cursor: pointer; }
        .btn-primary { background: #5f8cff; color: #fff; }
        .btn-ghost { background: #eef3ff; color: #3552a6; }
        .empty { background: #fff; border-radius: 18px; padding: 50px 20px; text-align: center; color: #7a8599; box-shadow: 0 8px 24px rgba(25, 43, 77, 0.08); }
        @media (max-width: 860px) { .top { grid-template-columns: 1fr; } .top img { height: 300px; } }
    </style>
</head>
<body>
<div id="user-toolbar" style="position:fixed;right:20px;top:20px;z-index:9999;display:flex;align-items:center;gap:0;background:#fff;border-radius:14px;box-shadow:0 8px 24px rgba(25,43,77,0.12);">
  <div id="toolbar-trigger" onclick="document.getElementById('toolbar-dropdown').classList.toggle('show')" style="display:flex;align-items:center;gap:10px;cursor:pointer;padding:8px 14px;border-radius:14px;">
    <svg width="40" height="40" viewBox="0 0 40 40"><circle cx="20" cy="20" r="20" fill="#5f8cff"/><circle cx="20" cy="14" r="8" fill="#fff" opacity=".95"/><ellipse cx="20" cy="37" rx="15" ry="11" fill="#fff" opacity=".95"/></svg>
    <span style="color:#24324a;font-size:16px;font-weight:600;" id="toolbar-username">未登录</span>
    <svg width="14" height="14" viewBox="0 0 14 14" style="flex-shrink:0;margin-left:2px;"><path d="M3.5 5.25L7 8.75l3.5-3.5" fill="none" stroke="#637089" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </div>
  <div id="toolbar-dropdown" style="display:none;position:absolute;right:0;top:64px;background:#fff;border-radius:12px;box-shadow:0 8px 24px rgba(25,43,77,0.15);min-width:140px;padding:6px 0;">
    <a href="/page/end/person.html" style="display:block;padding:10px 18px;font-size:15px;color:#24324a;text-decoration:none;">个人信息</a>
    <a href="/page/end/index.html" style="display:block;padding:10px 18px;font-size:15px;color:#3552a6;text-decoration:none;">管理后台</a>
    <a href="javascript:void(0)" onclick="handleLogout()" style="display:block;padding:10px 18px;font-size:15px;color:#c73636;text-decoration:none;">退出登录</a>
  </div>
</div>
<style>
#toolbar-dropdown.show { display:block !important; }
#toolbar-dropdown a:hover { background:#f5f7fb; }
</style>
<script>
document.addEventListener('click', function(e) {
  var d = document.getElementById('toolbar-dropdown');
  var t = document.getElementById('toolbar-trigger');
  if (d && t && !t.contains(e.target) && !d.contains(e.target)) {
    d.classList.remove('show');
  }
});
</script>

<div id="app" class="page-shell">
    <div v-if="loading" class="empty">正在加载动物详情...</div>
    <div v-else-if="!animal" class="empty">未找到该动物信息</div>
    <div v-else class="panel">
        <div class="top">
            <img :src="resolveImage(animal.tpic)" alt="动物图片" @error="handleImageError">
            <div class="content">
                <div class="title">{{ animal.tname || '未命名动物' }}</div>
                <div class="status">{{ formatState(animal.tstate) }}</div>
                <div class="meta">品种：{{ animal.ttype || '未知' }}</div>
                <div class="meta">性别：{{ animal.tsex || '未知' }}</div>
                <div class="meta">生日：{{ formatDate(animal.tbirthday) }}</div>
                <div class="meta">编号：{{ animal.id }}</div>
                <div class="desc">{{ animal.tdescribe || '暂无详细描述' }}</div>
                <div class="actions">
                    <button class="btn btn-primary" @click="goAdopt">申请领养</button>
                    <button class="btn btn-ghost" @click="goBack">返回列表</button>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="../../js/jquery.min.js"></script>
<script src="../../js/vue.min.js"></script>
<script src="../../js/element.js"></script>
<script>
new Vue({
  el: '#app',
  data: { animal: null, loading: true },
  mounted() { this.loadDetail(); },
  methods: {
    loadDetail() {
      const id = new URLSearchParams(location.search).get('id');
      if (!id) { this.loading = false; return; }
      $.ajax({ url: `/api/animal/${id}`, type: 'GET' })
        .then(res => { if (res.code === '0') { this.animal = res.data; } else { this.$message.error(res.msg || '加载详情失败'); } })
        .catch(() => { this.$message.error('网络异常，加载详情失败'); })
        .always(() => { this.loading = false; });
    },
    goAdopt() { if (!this.animal || !this.animal.id) return; location.href = `./adopt_apply.html?animalId=${this.animal.id}`; },
    goBack() { history.back(); },
    formatDate(value) { if (!value) return '未知'; const date = new Date(value); if (Number.isNaN(date.getTime())) return value; const y = date.getFullYear(); const m = String(date.getMonth() + 1).padStart(2, '0'); const d = String(date.getDate()).padStart(2, '0'); return `${y}-${m}-${d}`; },
    formatState(state) { if (state === 2) return '可领养'; if (state === 1) return '审核中'; if (state === 0) return '未发布'; return '未知状态'; },
    resolveImage(path) { if (!path) return '/img/b1.jpg'; if (path.startsWith('http://') || path.startsWith('https://')) return path; if (path.startsWith('/')) return path; return `/api/files/${path}`; },
    handleImageError(e) { e.target.src = '/img/b1.jpg'; }
  }
});
</script>
<script>
(function(){
  var u = sessionStorage.getItem('user') ? JSON.parse(sessionStorage.getItem('user')) : null;
  if (u && u.username) { document.getElementById('toolbar-username').textContent = u.username; }
})();
function handleLogout() {
  $.ajax({ url: '/api/user/logout', type: 'GET' }).always(function(){
    sessionStorage.removeItem('user');
    location.href = '/page/front/login.html';
  });
}
</script>
</body>
</html>
