<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>公告详情</title>
    <link rel="stylesheet" href="../../css/base.css">
    <link rel="stylesheet" href="../../css/theme.css">
    <link rel="stylesheet" href="../../css/element.css">
    <style>
        body { margin: 0; background: #F9FAFB; color: #24324a; }
        .page-shell { max-width: 920px; margin: 0 auto; padding: 28px 20px 60px; }
        .nav { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
        .chip { display: inline-flex; align-items: center; height: 38px; padding: 0 14px; border-radius: 999px; background: #fff; color: #1D4ED8; text-decoration: none; box-shadow: 0 8px 20px rgba(25, 43, 77, 0.06); }
        .panel { background: #fff; border-radius: 20px; box-shadow: 0 8px 24px rgba(25, 43, 77, 0.08); padding: 30px; }
        h1 { margin: 0 0 16px; font-size: 32px; }
        .content { white-space: pre-wrap; color: #4f5d74; line-height: 2; font-size: 16px; }
        .empty { background: #fff; border-radius: 18px; padding: 60px 20px; text-align: center; color: #7a8599; box-shadow: 0 8px 24px rgba(25, 43, 77, 0.08); }
    </style>
</head>
<body>
<div id="user-toolbar" style="position:fixed;right:20px;top:20px;z-index:9999;display:flex;align-items:center;gap:0;background:#fff;border-radius:14px;box-shadow:0 8px 24px rgba(25,43,77,0.12);">
  <div id="toolbar-trigger" onclick="document.getElementById('toolbar-dropdown').classList.toggle('show')" style="display:flex;align-items:center;gap:10px;cursor:pointer;padding:8px 14px;border-radius:14px;">
    <svg width="40" height="40" viewBox="0 0 40 40"><circle cx="20" cy="20" r="20" fill="#2563EB"/><circle cx="20" cy="14" r="8" fill="#fff" opacity=".95"/><ellipse cx="20" cy="37" rx="15" ry="11" fill="#fff" opacity=".95"/></svg>
    <span style="color:#24324a;font-size:16px;font-weight:600;" id="toolbar-username">未登录</span>
    <svg width="14" height="14" viewBox="0 0 14 14" style="flex-shrink:0;margin-left:2px;"><path d="M3.5 5.25L7 8.75l3.5-3.5" fill="none" stroke="#637089" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </div>
  <div id="toolbar-dropdown" style="display:none;position:absolute;right:0;top:64px;background:#fff;border-radius:12px;box-shadow:0 8px 24px rgba(25,43,77,0.15);min-width:140px;padding:6px 0;">
    <a href="/page/end/person.html" style="display:block;padding:10px 18px;font-size:15px;color:#24324a;text-decoration:none;">个人信息</a>
    <a href="/page/end/index.html" style="display:block;padding:10px 18px;font-size:15px;color:#1D4ED8;text-decoration:none;">管理后台</a>
    <a href="javascript:void(0)" onclick="handleLogout()" style="display:block;padding:10px 18px;font-size:15px;color:#c73636;text-decoration:none;">退出登录</a>
  </div>
</div>
<style>
#toolbar-dropdown.show { display:block !important; }
#toolbar-dropdown a:hover { background:#F9FAFB; }
</style>
<script>
document.addEventListener('click', function(e) {
  var d = document.getElementById('toolbar-dropdown');
  var t = document.getElementById('toolbar-trigger');
  if (d && t && !t.contains(e.target) && !d.contains(e.target)) {
    d.classList.remove('show');
  }
});
</script>

<div id="app" class="page-shell">
    <div class="nav">
        <a class="chip" href="./notice_list.html">返回公告列表</a>
        <a class="chip" href="./animal_browse.html">动物浏览</a>
        <a class="chip" href="./my_adopt.html">我的领养申请</a>
        <a class="chip" href="./volunteer_apply.html">义工申请</a>
            <a class="chip" href="./rescue_apply.html" style="background:#2563EB;color:#fff;">救助咨询</a>
            <a class="chip" href="./my_rescue.html">我的救助</a>
    </div>
    <div v-if="loading" class="empty">公告详情加载中...</div>
    <div v-else-if="!notice" class="empty">未找到公告内容</div>
    <div v-else class="panel">
        <h1>{{ notice.title || '未命名公告' }}</h1>
        <div class="content">{{ notice.content || '暂无内容' }}</div>
    </div>
</div>
<script src="../../js/jquery.min.js"></script>
<script src="../../js/vue.min.js"></script>
<script src="../../js/element.js"></script>
<script>
new Vue({
  el: '#app',
  data: { loading: true, notice: null },
  mounted() {
    const id = new URLSearchParams(location.search).get('id');
    if (!id) { this.loading = false; return; }
    $.ajax({ url: `/api/notice/${id}`, type: 'GET' })
      .then(res => {
        if (res.code === '0') this.notice = res.data;
        else this.$message.error(res.msg || '加载公告详情失败');
      })
      .catch(() => { this.$message.error('网络异常，加载公告详情失败'); })
      .always(() => { this.loading = false; });
  }
});
</script>
<script>
(function(){
  var u = sessionStorage.getItem('user') ? JSON.parse(sessionStorage.getItem('user')) : null;
  if (u && u.username) { document.getElementById('toolbar-username').textContent = u.username; }
})();
function handleLogout() {
  $.ajax({ url: '/api/user/logout', type: 'GET' }).always(function(){
    sessionStorage.removeItem('user');
    location.href = '/page/front/login.html';
  });
}
</script>
<script src="../../js/dark-mode.js"></script>
</body>
</html>
